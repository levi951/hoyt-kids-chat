<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoyt GPT</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Lexend', sans-serif;
      background: #f5f7f9;
      min-height: 100dvh;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .space-bg {
      background: radial-gradient(circle at 50% 50%, #dcc9ff 0%, #f5f7f9 70%);
    }
    .star-pattern {
      background-image: radial-gradient(circle, #702ae1 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.05;
    }
  </style>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
