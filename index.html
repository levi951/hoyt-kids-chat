<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="true" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hoyt GPT" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Hoyt GPT - AI Crew Access Portal" />
  <title>Hoyt GPT</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    * {
      -webkit-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    input, textarea, button {
      -webkit-user-select: text;
      user-select: text;
    }
    html, body {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Lexend', sans-serif;
      background: #000000;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -webkit-touch-callout: none;
    }
    #root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* iOS safe area support */
    .safe-area-inset-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .space-bg {
      background: radial-gradient(circle at 50% 50%, #dcc9ff 0%, #f5f7f9 70%);
    }
    .star-pattern {
      background-image: radial-gradient(circle, #702ae1 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.05;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
